<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tap Fight Dual Debug</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #05070d;
      }

      .dual-debug {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100vw;
        height: 100vh;
        gap: 1px;
        background: rgba(255, 255, 255, 0.18);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: #000;
      }

      @media (max-width: 760px) {
        .dual-debug {
          grid-template-columns: 1fr;
          grid-template-rows: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="dual-debug">
      <iframe
        title="Player one debug"
        src="/?debugBattle=1&themeId=office_battle_001&remoteThemeId=palace_battle_001"
      ></iframe>
      <iframe
        title="Player two debug"
        src="/?debugBattle=1&themeId=palace_battle_001&remoteThemeId=office_battle_001"
      ></iframe>
    </main>
  </body>
</html>
